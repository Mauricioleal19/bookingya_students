name: CI — BookingYa

on:
  push:
    branches: [ "main", "estudiantes" ]
  pull_request:
    branches: [ "main", "estudiantes" ]

jobs:

  build:
    name: Build & Serenity Tests (TDD + BDD + ATDD)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar proyecto
        run: mvn -B package -DskipTests --file pom.xml

      - name: Levantar backend en segundo plano
        run: |
          java -jar target/*.jar &
          echo "Esperando que el backend esté listo..."
          timeout 60 bash -c 'until curl -sf http://localhost:8080/api/guest; do sleep 2; done'

      - name: Ejecutar todos los tests (TDD + BDD + ATDD)
        run: mvn -B verify -P all --file pom.xml

      - name: Subir reporte Serenity
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: target/site/serenity/
          retention-days: 7